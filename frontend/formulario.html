<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="shortcut icon" href="./assets/images/among_us_player_red_icon_156942.png" type="image/x-icon" />
    <link rel="stylesheet" href="./css/brite.css" />
    <link rel="stylesheet" href="./css/estilos.css" />

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    
    <script src="./scripts/formulario.js"></script>

    <title>Registro de Dispositivo Electrónico</title>
</head>

<body>
    <div class="container">
        <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
            <div class="container-fluid">
                <div class="collapse navbar-collapse" id="navbarColor01">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="./datos.html">Datos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./formulario.html">Formulario Registro</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>
    <br />

    <div class="container">
        <p class="h3">Formulario de Registro de Dispositivos</p>
        <form id="formDispositivo">
            <div class="card p-4">
                
                <div class="row">
                    <div class="col">
                        <label for="selectUsuario" class="form-label">Seleccionar Propietario (Usuario):</label>
                        <select name="usuarioId" id="selectUsuario" class="form-select">
                            <option value="">Cargando usuarios...</option>
                        </select>
                    </div>
                </div>
                <br />

                <div class="row">
                    <div class="col">
                        <label for="inputTipo" class="form-label">Tipo de Dispositivo:</label>
                        <input type="text" name="tipo" id="inputTipo" class="form-control" placeholder="Ej: Smartphone, Laptop, SmartTV" />
                    </div>
                    <div class="col">
                        <label for="inputMarca" class="form-label">Marca:</label>
                        <input type="text" name="marca" id="inputMarca" class="form-control" placeholder="Ej: Apple, Samsung, Lenovo" />
                    </div>
                </div>
                <br />

                <div class="row">
                    <div class="col">
                        <label for="inputModelo" class="form-label">Modelo:</label>
                        <input type="text" name="modelo" id="inputModelo" class="form-control" placeholder="Ej: iPhone 15, Galaxy S24" />
                    </div>
                    <div class="col">
                        <label for="inputSerie" class="form-label">Número de Serie (Único):</label>
                        <input type="text" name="serie" id="inputSerie" class="form-control" placeholder="Ej: SN-12345678" />
                    </div>
                </div>
                <br />

                <div class="row">
                    <div class="col">
                        <label for="inputFecha" class="form-label">Fecha de Compra:</label>
                        <input type="date" name="fechaCompra" id="inputFecha" class="form-control" />
                    </div>
                    <div class="col">
                        <label for="inputGarantia" class="form-label">Meses de Garantía:</label>
                        <input type="number" name="garantiaMeses" id="inputGarantia" class="form-control" placeholder="Ej: 12" />
                    </div>
                </div>
                <br />

                <div class="row">
                    <div class="col">
                        <label for="inputSO" class="form-label">Sistema Operativo:</label>
                        <input type="text" name="sistemaOperativo" id="inputSO" class="form-control" placeholder="Ej: iOS, Android, Windows 11" />
                    </div>
                    <div class="col">
                        <label for="selectEstado" class="form-label">Estado del Dispositivo:</label>
                        <select name="estado" id="selectEstado" class="form-select">
                            <option value="Nuevo">Nuevo</option>
                            <option value="Usado">Usado</option>
                            <option value="En Reparación">En Reparación</option>
                        </select>
                    </div>
                    <div class="col">
                        <label for="inputValor" class="form-label">Valor ($):</label>
                        <input type="number" name="valor" id="inputValor" class="form-control" placeholder="Ej: 450000" />
                    </div>
                </div>
                <br />

                <div class="row">
                    <div class="col d-flex justify-content-end">
                        <input type="reset" value="Cancelar" class="btn btn-secondary me-2" />
                        <button type="button" class="btn btn-primary" onclick="guardarDispositivo()">
                            Guardar Dispositivo
                        </button>
                    </div>
                </div>

            </div>
        </form>
    </div>
</body>

</html>
